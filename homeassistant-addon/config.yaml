---
name: "NSAC - Android Audit Lab"
description: "Network Security Audit Console - Lab d'audit Android complet avec MobSF, mitmproxy, Frida et outils IPC."
version: "1.0.0"
slug: "nsac-android-audit"
url: "https://github.com/alexisdeudon01/nsac"
arch:
  - aarch64
  - amd64
  - armv7
startup: "application"
boot: "auto"
init: false

# Ports exposes
ports:
  5000/tcp: 5000       # NSAC Web UI
  8000/tcp: 8000       # MobSF
  8080/tcp: 8080       # Mitmproxy listen
  8081/tcp: 8081       # Mitmproxy Web UI
ports_description:
  5000/tcp: "NSAC Dashboard"
  8000/tcp: "MobSF Web UI"
  8080/tcp: "Mitmproxy Proxy"
  8081/tcp: "Mitmproxy Web UI"

# Ingress (integration dans le sidebar HA)
ingress: true
ingress_port: 5000
panel_icon: "mdi:shield-search"
panel_title: "NSAC Audit"

# Privileges necessaires
privileged:
  - NET_ADMIN          # iptables
  - SYS_ADMIN          # docker-in-docker
host_network: true     # acces au reseau host pour mitmproxy

# Options configurables
options:
  mobsf_enabled: true
  mitmproxy_enabled: true
  auto_start_services: true
  transparent_proxy: false
schema:
  mobsf_enabled: bool
  mitmproxy_enabled: bool
  auto_start_services: bool
  transparent_proxy: bool

# Mapping volumes
map:
  - share:rw           # /share pour les rapports
  - media:rw           # /media pour les APKs

# Docker-in-Docker
docker_api: true

# Ressources (Pi 4 minimum)
resources_limits:
  memory: 2048
