services:
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: mobsf
    ports:
      - "127.0.0.1:8000:8000"       # Bind local uniquement (securite)
    volumes:
      - mobsf_data:/root/.MobSF
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  mitmproxy:
    build: ./mitmproxy
    container_name: mitmproxy
    network_mode: host
    volumes:
      - mitmproxy_data:/home/mitmproxy/.mitmproxy
      - ./mitmproxy/config.json:/config/config.json:ro
    restart: unless-stopped

volumes:
  mobsf_data:
  mitmproxy_data:
